name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: mvn -B clean package
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: SimplestJavaIDE
          path: target/SimplestJavaIDE.jar
          if-no-files-found: error

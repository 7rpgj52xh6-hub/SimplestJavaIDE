name: release

# Builds native, self-contained packages (with a bundled JDK) for macOS, Linux
# and Windows -- on both Intel/x64 and ARM. jpackage cannot cross-compile, so
# each platform is built on its own runner.
#
# Trigger it by pushing a tag like `v2.0`, or run it by hand from the Actions
# tab (workflow_dispatch). On a tag push the artifacts are also attached to a
# GitHub Release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release on a tag

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14
            java-dist: temurin
          # Apple Silicon only: every Mac since 2020 is arm64, and GitHub's Intel
          # mac runners are heavily constrained. Add a macos-13 / macos-x64 entry
          # back here if old Intel Macs ever need support.
          - label: linux-x64
            runner: ubuntu-22.04
            java-dist: temurin
          - label: linux-arm64
            runner: ubuntu-22.04-arm
            java-dist: temurin
          - label: windows-x64
            runner: windows-latest
            java-dist: temurin
          - label: windows-arm64
            runner: windows-11-arm
            java-dist: microsoft   # Temurin has no Windows/AArch64 build yet

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: ${{ matrix.java-dist }}
          java-version: '21'
          cache: maven

      - name: Build runnable jar
        shell: bash
        run: mvn -B clean package

      # ---- macOS: a .dmg installer (drag the app into Applications) ----
      - name: Package (macOS .dmg)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bash packaging/jpackage.sh dmg
          mv dist/*.dmg "SimplestJavaIDE-${{ matrix.label }}.dmg"

      # ---- Linux: a portable .tar.gz (always) plus a best-effort .deb ----
      - name: Package (Linux portable + .deb)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # The portable app-image + tar.gz is the guaranteed deliverable and needs
          # no extra packages (binutils is preinstalled on the runners). Build it
          # FIRST so a flaky apt mirror can never cost us the Linux artifact.
          bash packaging/jpackage.sh app-image
          tar -C dist -czf "SimplestJavaIDE-${{ matrix.label }}.tar.gz" SimplestJavaIDE
          # The .deb is a nice-to-have; both `apt-get` and fakeroot can be flaky on
          # the hosted runners, so keep the whole thing best-effort.
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq fakeroot binutils || true
          if bash packaging/jpackage.sh deb; then
            mv dist/*.deb "SimplestJavaIDE-${{ matrix.label }}.deb" || true
          else
            echo "::warning::.deb build failed -- shipping the portable .tar.gz only"
          fi

      # ---- Windows: a portable .zip (contains SimplestJavaIDE.exe) ----
      - name: Package (Windows portable)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bash packaging/jpackage.sh app-image
          powershell -Command "Compress-Archive -Path dist/SimplestJavaIDE -DestinationPath SimplestJavaIDE-${{ matrix.label }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimplestJavaIDE-${{ matrix.label }}
          path: |
            SimplestJavaIDE-${{ matrix.label }}.dmg
            SimplestJavaIDE-${{ matrix.label }}.deb
            SimplestJavaIDE-${{ matrix.label }}.tar.gz
            SimplestJavaIDE-${{ matrix.label }}.zip
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SimplestJavaIDE-${{ matrix.label }}.dmg
            SimplestJavaIDE-${{ matrix.label }}.deb
            SimplestJavaIDE-${{ matrix.label }}.tar.gz
            SimplestJavaIDE-${{ matrix.label }}.zip
          fail_on_unmatched_files: false
